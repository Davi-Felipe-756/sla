<h1>Aprecie o Luige dançando</h1>

  <iframe width="560" height="315" src="https://www.youtube.com/embed/dVZJ436pmlk?si=Euu3mfHbnUnjnZt9" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

<audio id="audio">
  <source src="Death By Glamour.mp3" type="audio/mpeg">
</audio>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('video', {
    events: {
      'onStateChange': onPlayerStateChange
    }
  });
}

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.PLAYING) {
    document.getElementById("audio").play();
  }
}
</script>
